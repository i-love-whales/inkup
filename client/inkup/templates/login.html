<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>InkUp | Log In</title>
    <link rel="stylesheet" type="text/css" href="/static/styles/common.css">
    <link rel="stylesheet" type="text/css" href="/static/styles/elements/auth.css">
</head>

<body>
    <div class="auth-block">
        <h1>Log In</h1>
        <form method="post" action="{{ urls.login }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            {% if urls.redirected_from %}
               <script>
                alert("You should authorise before accessing that page.")
               </script>
               <input type="hidden" name="redirected_from" value="{{ urls.redirected_from }}">
            {% endif %}
            <div class="field">
                <label for="username">Username: </label><br>
                <input type="text" id="username" name="username" required />
                <br>
            </div>
            <div class="field">
                <label for="password">Password: </label><br>
                <input type="password" id="password" name="password" required />
                <br>
            </div>
            <input type="submit" value="Submit" id="submit">
            <div class="links">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" class="icon">
                    <path
                        d="M341.8 72.6C329.5 61.2 310.5 61.2 298.3 72.6L74.3 280.6C64.7 289.6 61.5 303.5 66.3 315.7C71.1 327.9 82.8 336 96 336L112 336L112 512C112 547.3 140.7 576 176 576L464 576C499.3 576 528 547.3 528 512L528 336L544 336C557.2 336 569 327.9 573.8 315.7C578.6 303.5 575.4 289.5 565.8 280.6L341.8 72.6zM304 384L336 384C362.5 384 384 405.5 384 432L384 528L256 528L256 432C256 405.5 277.5 384 304 384z"/>
                </svg>
                <a href="{{ urls.homepage }}">Go back to the homepage</a>
                <br>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" class="icon">
                    <path 
                        d="M285.7 368C384.2 368 464 447.8 464 546.3C464 562.7 450.7 576 434.3 576L77.7 576C61.3 576 48 562.7 48 546.3C48 447.8 127.8 368 226.3 368L285.7 368zM528 144C541.3 144 552 154.7 552 168L552 216L600 216C613.3 216 624 226.7 624 240C624 253.3 613.3 264 600 264L552 264L552 312C552 325.3 541.3 336 528 336C514.7 336 504 325.3 504 312L504 264L456 264C442.7 264 432 253.3 432 240C432 226.7 442.7 216 456 216L504 216L504 168C504 154.7 514.7 144 528 144zM256 312C189.7 312 136 258.3 136 192C136 125.7 189.7 72 256 72C322.3 72 376 125.7 376 192C376 258.3 322.3 312 256 312z"/>
                </svg>
                <a href="{{ urls.signup }}">Sing Up</a>
            </div>
        </form>
    </div>
</body>

</html>
